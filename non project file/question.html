    }

    }

      margin-top: 10px;
      border: none;
      border-radius: 6px;
      background: #316ff6;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background: #1d4ed8;
    }
    .answer-btn {
      display: block;
      width: 100%;
      margin: 8px 0;
      background: #ddd;
      color: black;
      padding: 10px;
      border-radius: 6px;
      cursor: pointer;
      border: 2px solid transparent;
      font-size: 15px;
    }

      border-color: #0f8f0f;
      color: white;
    }
    .answer-btn.wrong {
      background: #ff4d4d !important;
      border-color: #cc0000;
      color: white;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 8px;
      overflow: hidden;
    }
    th, td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
      text-align: center;

</head>

  <!-- SCREEN: HOME -->
  <div id="homeScreen" class="card">

/* ------------------------------
   VARIABLES DU JEU
-------------------------------- */
let selected = [];
let index = 0;
let score = 0;
let answered = false;

/* ------------------------------
   SCOREBOARD
-------------------------------- */
function loadScores() {
  const table = document.getElementById("scoreTable");
  const scores = JSON.parse(localStorage.getItem("quizScores") || "[]");
  table.innerHTML = "<tr><th>#</th><th>Score</th><th>Date</th></tr>";

  scores.forEach((s, i) => {
    table.innerHTML += `
      <tr>
        <td>${i + 1}</td>
        <td>${s.score}/20</td>
        <td>${s.date}</td>
      </tr>`;
  });
}

/* ------------------------------
   START
-------------------------------- */
function startGame() {
  document.getElementById("homeScreen").style.display = "none";
  document.getElementById("endScreen").style.display = "none";
  document.getElementById("quizScreen").style.display = "block";

  score = 0;
  index = 0;

  selected = QUESTIONS.sort(() => Math.random() - 0.5).slice(0, 20);

  showQuestion();
}

/* ------------------------------
   SHOW QUESTION
-------------------------------- */
function showQuestion() {
  const q = selected[index];
  answered = false;

  document.getElementById("nextBtn").style.display = "none";

  document.getElementById("questionText").innerText =
    `Question ${index + 1}/20 : ${q.question}`;

  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  q.answers.forEach(ans => {
    answersDiv.innerHTML += `
      <button class="answer-btn"
              onclick="checkAnswer(this, '${ans.replace(/'/g, "\\'")}')">
        ${ans}
      </button>`;
  });

  document.getElementById("feedback").innerText = "";
}

/* ------------------------------
   CHECK ANSWER
-------------------------------- */
function checkAnswer(button, answer) {
  if (answered) return;
  answered = true;

  const q = selected[index];
  const buttons = document.querySelectorAll(".answer-btn");

  const isCorrect = 
    Array.isArray(q.correctAnswer)
      ? q.correctAnswer.includes(answer)
      : answer === q.correctAnswer;

  // Color buttons
  buttons.forEach(btn => {
    btn.disabled = true;
    if (btn.innerText === q.correctAnswer || 
       (Array.isArray(q.correctAnswer) && q.correctAnswer.includes(btn.innerText))) {
      btn.classList.add("correct");
    }
  });

  if (!isCorrect) {
    button.classList.add("wrong");
  } else {
    score++;
  }

  document.getElementById("nextBtn").style.display = "block";
}

/* ------------------------------
   NEXT QUESTION
-------------------------------- */
function nextQuestion() {
  index++;
  if (index < 20) showQuestion();
  else endGame();
}

/* ------------------------------
   END
-------------------------------- */
function endGame() {
  document.getElementById("quizScreen").style.display = "none";
  document.getElementById("endScreen").style.display = "block";

  document.getElementById("finalScore").innerText =
    `🎉 Score final : ${score}/20`;

  saveScore(score);
}

/* ------------------------------
   SAVE SCORE
-------------------------------- */
function saveScore(score) {
  const scores = JSON.parse(localStorage.getItem("quizScores") || "[]");

  scores.push({
    score,
    date: new Date().toLocaleString()
  });

  localStorage.setItem("quizScores", JSON.stringify(scores));
  loadScores();
}

function restart() {
  startGame();
}

function goHome() {
  document.getElementById("quizScreen").style.display = "none";
  document.getElementById("endScreen").style.display = "none";
  document.getElementById("homeScreen").style.display = "block";
}

/* ------------------------------
   LOAD SCORES ON START
-------------------------------- */
loadScores();
</script>
